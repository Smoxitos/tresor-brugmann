name: Déployer le jeu sur GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v6

      - name: Installer pnpm
        uses: pnpm/action-setup@v6

      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Vérifier et construire le site
        run: pnpm run build

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v6

      - name: Préparer les fichiers du site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publier le site
        id: deployment
        uses: actions/deploy-pages@v5
